# ============================================================================
# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Claude"

ai_usage_summary: |
  Used Claude to help design the scoring architecture, calibrate honeypot
  detection and title/skill tiers against the real 100K candidate pool
  (via exploratory analysis scripts), and write/debug the ranking code.
  All scoring logic, thresholds, and design decisions were reviewed and
  validated against the actual dataset before being finalized. No
  candidate data was sent to any hosted LLM API as part of the ranking
  pipeline itself — rank.py makes no network calls.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Rule-based hybrid ranker with five weighted components (title/career
  history, trust-filtered skills, experience profile, location, culture
  fit) combined with a multiplicative behavioral-availability modifier.
  Title and skill scoring tiers were calibrated by analyzing frequency
  distributions across the full 100K pool, not guessed. Honeypot detection
  uses a single high-precision rule ("expert" proficiency with 0 months of
  use) chosen after testing several candidate heuristics against the real
  data — a naive "many expert skills" rule was explicitly rejected because
  it incorrectly flagged genuinely senior, legitimate ML candidates.
  Runtime: ~12 seconds for the full 100K pool on a single CPU core, no GPU,
  no network calls.

